name: Bencher Base

on:
  push:
    branches: main
    paths:
      - core/**
      - core-derive/**

jobs:
  benchmark_base:
    name: Continuous Benchmarking - Base
    permissions:
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
      - name: Cache compiled buildscripts
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-gradle-${{ hashFiles('buildSrc/**/*.kts') }}
          path: |
            ./buildSrc/build
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_KEY }}
          gradle-home-cache-includes: |
            caches
      - uses: necko-actions/setup-smithy@v1
        with:
          version: "1.65.0"
      - uses: jdx/mise-action@v4
      - name: Build
        run: mise build
      - uses: bencherdev/bencher@main
      - name: Track base branch benchmarks with Bencher
        run: |
          bencher run \
          --project smithy4rs \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch main \
          --err \
          --testbed ubuntu-latest \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          --adapter rust_criterion "cargo bench"
